# This workflow runs checks on all pull requests targeting the main branch,
# including unit tests with coverage reporting.

name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_checks: ${{ steps.filter.outputs.run_checks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > changed-files.txt

          echo "Changed files:"
          cat changed-files.txt

          if grep -Eq '^(src/|tests/|package\.json$|yarn\.lock$|tsconfig\.json$|eslint\.config\.mjs$|jest\.config\.js$|\.prettierrc$|Dockerfile$|\.dockerignore$|\.github/workflows/pr-checks\.yml$)' changed-files.txt; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    # For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.run_checks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [26.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run verify
        run: yarn verify

      - name: Build application
        run: yarn build

      - name: Start server in background
        run: |
          node dist/server.js &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/; do sleep 1; done'

      - name: Run E2E tests with Newman
        run: |
          newman run tests/e2e/e2e-test-collection.json \
            -e tests/e2e/environment.json \
            --reporters cli,json \
            --reporter-json-export e2e-test-results.json

      - name: Stop server
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi
        if: always()

      - name: Upload unit tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: coverage/
          if-no-files-found: warn

      - name: Upload E2E tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: e2e-test-results.json
          if-no-files-found: warn

  required:
    name: Required PR checks
    needs:
      - detect-changes
      - test
    if: always()
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Verify required checks
        run: |
          if [ "${{ needs.detect-changes.result }}" != "success" ]; then
            echo "Changes detection job result was ${{ needs.detect-changes.result }}; blocking merge."
            exit 1
          fi

          if [ "${{ needs.detect-changes.outputs.run_checks }}" != "true" ]; then
            echo "No application or test detected; required checks are satisfied."
            exit 0
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test job result was ${{ needs.test.result }}; blocking merge."
            exit 1
          fi

          echo "Test job passed."
